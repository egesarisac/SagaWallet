# Prometheus Configuration for SagaWallet

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'wallet-service'
    static_configs:
      - targets: ['wallet-service:8081']
    metrics_path: /metrics

  - job_name: 'transaction-service'
    static_configs:
      - targets: ['transaction-service:8083']
    metrics_path: /metrics

  - job_name: 'notification-service'
    static_configs:
      - targets: ['notification-service:8084']
    metrics_path: /metrics
