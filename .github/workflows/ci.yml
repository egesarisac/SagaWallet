name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===================
  # Lint (parallel per module)
  # ===================
  lint:
    name: Lint (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - pkg
          - pkg/middleware
          - pkg/errors
          - api
          - services/wallet-service
          - services/transaction-service
          - services/notification-service
          - tests/integration
          - tools/tokengen

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: ${{ matrix.module }}
          args: --timeout=5m
          install-mode: goinstall

  # ===================
  # Test (parallel per module)
  # ===================
  test:
    name: Test (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - pkg/middleware
          - services/wallet-service
          - services/transaction-service
          - services/notification-service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: Run tests
        working-directory: ${{ matrix.module }}
        run: go test -v -race ./...

  # ===================
  # Stable PR status check for branch protection
  # ===================
  pr-gate:
    name: PR Checks
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: ${{ always() }}

    steps:
      - name: Ensure required PR jobs passed
        run: |
          test "${{ needs.lint.result }}" = "success"
          test "${{ needs.test.result }}" = "success"
