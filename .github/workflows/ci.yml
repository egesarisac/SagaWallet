name: CI/CD Pipeline

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: us-central1-docker.pkg.dev
  GCP_PROJECT_ID: go-fintech-microservices
  IMAGE_PREFIX: us-central1-docker.pkg.dev/go-fintech-microservices/go-fintech/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ===================
  # Lint (parallel per module)
  # ===================
  lint:
    name: Lint (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - pkg
          - pkg/middleware
          - pkg/errors
          - api
          - services/wallet-service
          - services/transaction-service
          - services/notification-service
          - tests/integration
          - tools/tokengen

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: ${{ matrix.module }}
          args: --timeout=5m
          install-mode: goinstall

  # ===================
  # Test (parallel per module)
  # ===================
  test:
    name: Test (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - pkg/middleware
          - services/wallet-service
          - services/transaction-service
          - services/notification-service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: Run tests
        working-directory: ${{ matrix.module }}
        run: go test -v -race ./...

  # ===================
  # Stable PR status check for branch protection
  # ===================
  pr-gate:
    name: PR Checks
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: ${{ always() && github.event_name == 'pull_request' }}

    steps:
      - name: Ensure required PR jobs passed
        run: |
          test "${{ needs.lint.result }}" = "success"
          test "${{ needs.test.result }}" = "success"

  # ===================
  # Build Docker Images (parallel per service)
  # ===================
  build:
    name: Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write # Required for GCP auth
      packages: write

    strategy:
      fail-fast: false
      matrix:
        service:
          - wallet-service
          - transaction-service
          - notification-service

    steps:
      - uses: actions/checkout@v4

      # Auth to GCP for GAR push
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set DOCKER_CONFIG
        run: echo "DOCKER_CONFIG=$RUNNER_TEMP/.docker" >> "$GITHUB_ENV"

      - name: Init Docker config
        run: mkdir -p "$DOCKER_CONFIG"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: _json_key
          password: ${{ secrets.GCP_SA_KEY }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: build/docker/${{ matrix.service }}.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===================
  # Deploy to Cloud Run
  # ===================
  deploy:
    name: Deploy (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: build
    # Deploy only on pushes to main
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    strategy:
      matrix:
        service:
          - wallet-service
          - transaction-service
          - notification-service

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ matrix.service }}
          image: ${{ env.IMAGE_PREFIX }}${{ matrix.service }}:latest
          region: us-central1
          # Note: Env vars are managed by Terraform but this step
          # triggers the update of the service to use the latest image tag.
